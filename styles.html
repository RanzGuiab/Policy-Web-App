<style>

/* ===========================
   CSS VARIABLES & RESET
   =========================== */
:root {
  --navy:           #0f1f3d;
  --navy-mid:       #162442;
  --navy-light:     #1e3058;
  --accent:         #1a3a6b;
  --accent-bright:  #2563eb;
  --accent-glow:    #3b82f6;

  --white:          #ffffff;
  --bg:             #f8f9fc;
  --surface:        #ffffff;
  --border:         #e8ecf2;
  --text-primary:   #1a202c;
  --text-secondary: #6b7280;
  --text-muted:     #9ca3af;

  --sidebar-width:  270px;
  --navbar-height:  52px;
  --radius:         10px;
  --shadow:         0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:      0 4px 12px rgba(0,0,0,0.08);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }


/* ===========================
   NAVBAR
   =========================== */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--navbar-height);
  background: var(--navy);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 100;
  box-shadow: 0 1px 0 rgba(255,255,255,0.06);
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 9px;
  color: #ffffff;
  font-weight: 700;
  font-size: 15px;
  min-width: 150px;
  letter-spacing: -0.2px;
}

.navbar-brand svg { color: #60a5fa; flex-shrink: 0; }

.brand-name {
  background: #ffffff;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 200;
}

.navbar-search {
  flex: 1;
  max-width: 500px;
  margin-left: auto;
  position: relative;
  display: flex;
  align-items: center;
}

.navbar-search input {
  width: 100%;
  padding: 7px 38px 7px 36px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #ffffff;
  font-size: 13.5px;
  outline: none;
  transition: all 0.2s;
}

.navbar-search input::placeholder { color: rgba(255,255,255,0.45); }
.navbar-search input:focus {
  background: rgba(255,255,255,0.12);
  border-color: rgba(96,165,250,0.5);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.search-icon {
  position: absolute;
  left: 11px;
  color: rgba(255,255,255,0.45);
  pointer-events: none;
}


/* ===========================
   APP LAYOUT
   =========================== */
.app-layout {
  display: flex;
  margin-top: var(--navbar-height);
  min-height: calc(100vh - var(--navbar-height));
}


/* ===========================
   SIDEBAR
   =========================== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  top: var(--navbar-height);
  bottom: 0;
  left: 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-content { flex: 1; padding: 8px 0 20px; }

.sidebar-section { margin-bottom: 4px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px 5px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  user-select: none;
}

.nav-group { margin-bottom: 2px; }

.nav-group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  border-radius: 6px;
  margin: 0 8px;
  transition: background 0.15s;
  user-select: none;
}

.nav-group-header:hover { background: var(--bg); }
.nav-group-header svg { color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
.nav-group-header.expanded svg { transform: rotate(0deg); }

.nav-items { padding-left: 10px; }

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 12px 5px 28px;
  font-size: 13px;
  color: var(--text-secondary);
  border-radius: 6px;
  margin: 1px 8px;
  transition: all 0.15s;
}

.nav-item:hover {
  background: var(--bg);
  color: var(--text-primary);
}

.nav-item.active {
  background: #eff6ff;
  color: var(--accent-bright);
  font-weight: 600;
}


/* ===========================
   MAIN CONTENT
   =========================== */
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  padding: 32px 36px;
  max-width: 1000px;
}


/* ===========================
   CARDS
   =========================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow);
}

.card-header-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}

.card-header-label svg { color: var(--accent-bright); }


/* ===========================
   HOME — CONTENT GRID
   =========================== */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.welcome-card {
  grid-column: span 2;
  border-top: 3px solid var(--accent-bright);
}

.welcome-card h3 {
  font-size: 15.5px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 10px;
}

.welcome-card p {
  color: var(--text-secondary);
  font-size: 13.5px;
  margin-bottom: 8px;
  line-height: 1.6;
}

.cta-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  color: var(--accent-bright);
  font-size: 13px;
  font-weight: 600;
  transition: gap 0.15s;
}

.cta-link:hover { gap: 8px; }

.find-card { grid-column: span 2; }

.field-label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  margin-bottom: 4px;
}

.input-wrapper svg {
  position: absolute;
  left: 11px;
  color: var(--text-muted);
  pointer-events: none;
}

.input-wrapper input {
  width: 100%;
  padding: 9px 14px 9px 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--text-primary);
  outline: none;
  background: var(--bg);
  transition: all 0.2s;
  font-family: inherit;
}

.input-wrapper input::placeholder { color: var(--text-muted); }
.input-wrapper input:focus {
  border-color: var(--accent-bright);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  background: var(--white);
}

.or-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
  color: var(--text-muted);
  font-size: 12px;
}

.or-divider::before,
.or-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.recent-card { margin-top: 0; }
.doc-list { display: flex; flex-direction: column; gap: 2px; }
.doc-empty { font-size: 13px; color: var(--text-muted); font-style: italic; }

.doc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 7px;
  font-size: 13.5px;
  color: var(--text-primary);
  transition: background 0.15s;
  cursor: pointer;
}

.doc-row:hover { background: var(--bg); }
.doc-row svg { color: var(--accent-bright); flex-shrink: 0; }

.doc-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}


/* ===========================
   BACK BUTTON
   =========================== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
}

.back-btn:hover {
  background: var(--bg);
  color: var(--text-primary);
  border-color: #c8d0db;
}


/* ===========================
   POLICY PAGE — CONTAINER 1
   =========================== */
.policy-overview-card {
  margin-bottom: 16px;
  border-top: 3px solid var(--accent-bright);
}

.policy-overview-grid {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.policy-media {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: #f0f4f8;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  transition: box-shadow 0.3s ease 0.1s,
              transform   0.3s ease 0.1s;  /* ✅ 0.1s delay on both */
  cursor: pointer;
}

.policy-media:hover {
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
  transform: translateY(-2px);
}

.policy-media img,
.policy-media iframe {
  transition: transform 0.4s ease 0.1s;   /* ✅ same delay */
  transform-origin: center center;
}

.policy-media:hover img,
.policy-media:hover iframe {
  transform: scale(1.02);
}
.policy-media img {
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  object-position: center;
  display: block;
  border-radius: 10px 10px 0 0;
}

.policy-media iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  border-radius: 10px;
  display: block;
}

.media-placeholder {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
}

.media-placeholder svg { opacity: 0.25; }

.policy-summary {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.policy-summary h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
  margin-top: 6px;
  margin-bottom: 4px;
}

.policy-tagline {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 16px;
}

.policy-bullets {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.policy-bullets li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13.5px;
  color: var(--text-primary);
  line-height: 1.5;
  padding: 8px 12px;
  background: #f8faff;
  border: 1px solid #e8eef8;
  border-radius: 7px;

  /* Animation setup */
  transition: 
    transform 0.25s ease,
    box-shadow 0.25s ease,
    border-color 0.25s ease,
    background 0.25s ease;
}

.policy-bullets li:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 14px rgba(0, 60, 255, 0.08);
  border-color: var(--accent-bright);
  background: #ffffff;
}

.policy-bullets li::before {
  content: '✔';
  color: var(--accent-bright);
  font-size: 12px;
  margin-top: 1px;
  flex-shrink: 0;
  font-weight: 700;
  transition: transform 0.25s ease;
}

.policy-bullets li:hover::before {
  transform: scale(1.2);
}

.policy-bullets li {
  position: relative;
  overflow: hidden;
}

.policy-bullets li::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 0;
  background: var(--accent-bright);
  transition: width 0.25s ease;
  opacity: 0.05;
}

.policy-bullets li:hover::after {
  width: 100%;
}

/* ===========================
   POLICY PAGE — CONTAINER 2
   =========================== */
.policy-full-card { margin-bottom: 16px; }

.policy-full-body {
  font-size: 13.5px;
  color: var(--text-primary);
  line-height: 1.9;
  white-space: pre-wrap;
  padding-top: 4px;
  padding: 8px;
  min-height: 250px; max-height: 500px; overflow-y: auto;
}

.doc-loading {
  color: var(--text-muted);
  font-size: 13px;
  font-style: italic;
}

.doc-error {
  color: #dc2626;
  font-size: 13px;
  font-style: italic;
}


/* ===========================
   SIDEBAR TOGGLE BUTTON
   =========================== */
.sidebar-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  color: #ffffff;
  flex-shrink: 0;
  transition: background 0.15s;
}

.sidebar-toggle:hover { background: rgba(255,255,255,0.1); }


/* ===========================
   SIDEBAR OVERLAY (mobile)
   =========================== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 149;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.sidebar-overlay.active {
  display: block;
  opacity: 1;
}


/* ===========================
   RESPONSIVE
   =========================== */
@media (max-width: 900px) {
  .content-grid { grid-template-columns: 1fr; }
  .welcome-card, .find-card { grid-column: span 1; }
}

@media (max-width: 768px) {
  .policy-summary h2 { font-size: 17px; }
}

@media (max-width: 650px) {
  .sidebar-toggle { display: flex; }

  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 150;
    box-shadow: none;
  }

  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
  }

  .main-content { margin-left: 0; padding: 20px 16px; }
}

@media (max-width: 480px) {
  .policy-bullets li { font-size: 13px; padding: 7px 10px; }
  .policy-tagline { font-size: 13px; }
  .policy-full-body { font-size: 13px; }
}

/* ===========================
   BULLET — CLICKABLE STATE
   =========================== */
.policy-bullets li.bullet-clickable {
  cursor: pointer;
  transition: all 0.15s;
}

.policy-bullets li.bullet-clickable:hover {
  background: #e8f0fe;
  border-color: #bfcffc;
  color: var(--accent-bright);
}

.policy-bullets li.bullet-clickable::after {
  content: '→';
  margin-left: auto;
  font-size: 12px;
  color: var(--accent-bright);
  opacity: 0.7;
  flex-shrink: 0;
}


/* ===========================
   MODAL OVERLAY
   =========================== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: clamp(12px, 3vw, 32px);   /* ✅ shrinks on small screens, breathes on large */
  opacity: 0;
  transition: opacity 0.2s ease;
}

.modal-overlay.active {
  display: flex;
  opacity: 1;
}


/* ===========================
   MODAL BOX
   =========================== */

@keyframes modalSlideIn {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 48px;
  right: 48px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 6px;
  border: none;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.10);
  background: #f0f0f0; /* solid by default */
  color: var(--text-muted);

  transition: transform 0.15s ease, 
              background 0.15s ease, 
              color 0.15s ease;
}

.modal-close:hover {
  background: var(--bg);
  color: var(--text-primary);
  transform: scale(1.2);
}

.modal-close:active {
  transform: scale(0.95);
}

.modal-header-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
}

.modal-header-label svg { color: var(--accent-bright); }

.modal-box h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
  line-height: 1.4;
  padding-right: 24px;
}

.modal-box p {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.75;
}


/* ===========================
   RESPONSIVE MODAL
   =========================== */

/* ===========================
   MODAL MEDIA CONTAINER
   =========================== */
.modal-media {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  background: #f0f4f8;
  border: 1px solid var(--border);
  margin-bottom: 18px;
}

/* Image */
.modal-media img {
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  object-position: center;
  display: block;
  border-radius: 10px 10px 0 0;
}

/* Video / YouTube iframe */
.modal-media iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  display: block;
  border-radius: 10px 10px 0 0;
  min-height: 200px;                 /* ✅ never collapses on small screens */
  max-height: 55vh;                  /* ✅ never dominates the modal */
}

/* Caption below media */
.modal-media-caption {
  display: block;
  font-size: 11.5px;
  color: var(--text-muted);
  text-align: center;
  padding: 6px 12px 8px;
  background: #f8faff;
  border-top: 1px solid var(--border);
  border-radius: 0 0 10px 10px;
}

/* ===========================
   MODAL BOX — slightly taller
   when media is present
   =========================== */
.modal-box {
  background: var(--surface);
  border-radius: 14px;
  padding: clamp(18px, 3vw, 32px);   /* ✅ padding scales with viewport */
  width: min(92vw, 1000px);          /* ✅ 92% of screen up to 1000px max */
  max-height: min(90vh, 900px);      /* ✅ 90% of screen height up to 900px */
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  position: relative;
  animation: modalSlideIn 0.2s ease;

  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }
.modal-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 480px) {
  .modal-box              { padding: 22px 18px 20px; }
  .modal-box h3           { font-size: 15px; }
  .modal-box p            { font-size: 13px; }
  .modal-media-placeholder{ min-height: 90px; padding: 18px 12px; }
}

/* ===========================
   MODAL MEDIA PLACEHOLDER
   (shown when media.src is empty)
   =========================== */

.modal-media-placeholder {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 10px;
  border: 1.5px dashed var(--border);
  background: #f8f9fc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 18px;
  padding: 20px;
}

.modal-media-placeholder svg {
  opacity: 0.25;
  color: var(--text-muted);
}

.modal-media-placeholder span {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.2px;
}
/* ===========================
   MODAL MEDIA SWITCHER
   =========================== */
.media-switcher {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.media-switcher-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;           /* pill shape */
  font-size: 12.5px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}

.media-switcher-btn:hover {
  border-color: var(--accent-bright);
  color: var(--accent-bright);
  background: #eff6ff;
}

.media-switcher-btn.active {
  background: var(--accent-bright);
  border-color: var(--accent-bright);
  color: #ffffff;
}

.media-switcher-btn svg {
  flex-shrink: 0;
}

/* ===========================
   SEARCH DROPDOWN
   =========================== */
.navbar-search {
  position: relative; 
}

.search-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 9999;
  overflow: visible;         /* ✅ don't clip the list */
  display: flex;
  flex-direction: column;
}


.search-dropdown-count {
  font-size: 11.5px;
  color: var(--text-muted);
