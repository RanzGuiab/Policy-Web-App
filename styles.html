<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root {
  --ink-950: #111827;
  --ink-700: #334155;
  --ink-500: #64748b;
  --line: #dbe3ed;
  --surface: #ffffff;
  --bg-soft: #f6efe8;
  --bg-warm: #f5dcbf;
  --mint: #0f766e;
  --mint-soft: #d7f5ef;
  --amber: #f97316;
  --amber-soft: #ffe8d5;
  --radius: 14px;
  --topbar-h: 68px;
  --sidebar-w: 290px;
  --shadow-card: 0 12px 30px rgba(17, 24, 39, 0.08);
  --shadow-pop: 0 20px 60px rgba(17, 24, 39, 0.18);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  color: var(--ink-950);
  background:
    radial-gradient(1000px 500px at 15% -10%, #ffd9b3 0, transparent 65%),
    radial-gradient(1000px 500px at 100% 0%, #d4f8f0 0, transparent 70%),
    var(--bg-soft);
}

h1,
h2,
h3,
.eyebrow,
.brand,
.build-chip {
  font-family: 'Space Grotesk', sans-serif;
}

a { text-decoration: none; color: inherit; }
button, input { font: inherit; }

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  height: var(--topbar-h);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  backdrop-filter: blur(8px);
  background: rgba(255, 255, 255, 0.8);
  border-bottom: 1px solid rgba(17, 24, 39, 0.08);
}

.brand {
  border: 0;
  background: transparent;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--ink-950);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.01em;
  cursor: pointer;
}

.build-chip {
  font-size: 0.72rem;
  color: var(--mint);
  background: var(--mint-soft);
  padding: 6px 10px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.top-search {
  margin-left: auto;
  position: relative;
  width: min(540px, 46vw);
}

.top-search input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  color: var(--ink-950);
  padding: 11px 14px 11px 38px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.top-search input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15);
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 12px;
  color: var(--ink-500);
}

.app-shell {
  margin-top: var(--topbar-h);
  display: flex;
  min-height: calc(100vh - var(--topbar-h));
}

.sidebar {
  width: var(--sidebar-w);
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  bottom: 0;
  border-right: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(6px);
  overflow-y: auto;
}

.sidebar-head {
  position: sticky;
  top: 0;
  background: rgba(255, 255, 255, 0.95);
  border-bottom: 1px solid var(--line);
  padding: 16px;
  z-index: 2;
}

.sidebar-title {
  font-weight: 700;
  font-size: 0.96rem;
}

.sidebar-subtitle {
  color: var(--ink-500);
  font-size: 0.84rem;
  margin-top: 2px;
}

.sidebar-groups {
  padding: 10px 10px 24px;
}

.main-content {
  margin-left: var(--sidebar-w);
  padding: 28px;
  width: min(1100px, calc(100vw - var(--sidebar-w)));
}

.card {
  background: var(--surface);
  border: 1px solid rgba(17, 24, 39, 0.08);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
}

.hero-card {
  padding: 28px;
  background:
    linear-gradient(120deg, rgba(249, 115, 22, 0.18), rgba(15, 118, 110, 0.14)),
    #fff;
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.75rem;
  color: var(--mint);
  margin-bottom: 8px;
  font-weight: 700;
}

.hero-card h1 {
  font-size: clamp(1.5rem, 2.6vw, 2.2rem);
  line-height: 1.15;
  margin-bottom: 10px;
}

.hero-card p {
  color: var(--ink-700);
  max-width: 70ch;
}

.stats-grid {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.stat-card {
  padding: 16px;
  background: linear-gradient(180deg, #fff 0%, #fff9f3 100%);
}

.stat-card p {
  color: var(--ink-500);
  font-size: 0.82rem;
  margin-bottom: 7px;
}

.stat-card h3 {
  font-size: 1.75rem;
  line-height: 1;
}

.recent-card,
.policy-overview-card,
.policy-full-card {
  margin-top: 16px;
  padding: 20px;
}

.section-heading h2 {
  font-size: 1.1rem;
}

.section-heading p {
  color: var(--ink-500);
  font-size: 0.9rem;
  margin-top: 3px;
}

.doc-list {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.doc-row {
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.doc-row:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 16px rgba(17, 24, 39, 0.08);
}

.doc-time {
  color: var(--ink-500);
  font-size: 0.8rem;
}

.doc-empty,
.doc-loading {
  color: var(--ink-500);
  font-style: italic;
}

.doc-error {
  color: #b91c1c;
}

.back-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink-700);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.policy-overview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.policy-media,
.modal-media {
  border-radius: 12px;
  background: #f8fafc;
  border: 1px solid var(--line);
  overflow: hidden;
}

.policy-media img,
.modal-media img,
.policy-media iframe,
.modal-media iframe,
.modal-media video {
  width: 100%;
  display: block;
  border: 0;
  aspect-ratio: 16 / 9;
}

.media-placeholder,
.modal-media-placeholder,
.video-loading-box {
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--ink-500);
  font-size: 0.9rem;
  text-align: center;
  padding: 16px;
}

.policy-summary h2 {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.policy-tagline {
  color: var(--ink-700);
  margin-bottom: 12px;
}

.policy-bullets {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.policy-bullets li {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 12px;
  background: #fff;
}

.policy-bullets li.bullet-clickable {
  cursor: pointer;
  background: linear-gradient(90deg, #fff, #fffbf5);
}

.policy-bullets li.bullet-clickable:hover {
  border-color: var(--amber);
}

.policy-full-body {
  margin-top: 12px;
  min-height: 320px;
}

.doc-embed-wrapper {
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
}

.doc-embed-frame {
  width: 100%;
  height: 78vh;
  border: 0;
}

.nav-group {
  margin-bottom: 8px;
}

.nav-group-header {
  width: 100%;
  border: 0;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--ink-950);
  font-weight: 600;
  padding: 9px 10px;
}

.nav-group-header:hover {
  background: #fff;
}

.nav-items {
  display: none;
  padding-left: 8px;
}

.nav-group-header.expanded + .nav-items {
  display: block;
}

.nav-item {
  display: block;
  padding: 8px 10px;
  border-radius: 8px;
  color: var(--ink-700);
  margin-top: 4px;
}

.nav-item:hover,
.nav-item.active {
  background: var(--amber-soft);
  color: #9a3412;
}

.media-switcher {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.media-switcher-btn {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 12px;
  background: #fff;
  cursor: pointer;
}

.media-switcher-btn.active {
  background: var(--mint);
  border-color: var(--mint);
  color: #fff;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(15, 23, 42, 0.55);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.active {
  display: flex;
}

.modal-box {
  background: #fff;
  border-radius: 16px;
  width: min(920px, 100%);
  max-height: 90vh;
  overflow: auto;
  padding: 18px;
  box-shadow: var(--shadow-pop);
  animation: fade-up 0.2s ease;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-box h3 {
  font-size: 1.15rem;
  margin-bottom: 8px;
}

.modal-box p {
  color: var(--ink-700);
  white-space: pre-wrap;
}

.modal-media-caption {
  display: block;
  padding: 8px 10px;
  color: var(--ink-500);
  border-top: 1px solid var(--line);
  font-size: 0.85rem;
}

.search-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
  z-index: 400;
}

.search-dropdown-count {
  padding: 8px 10px 6px;
  font-size: 0.8rem;
  color: var(--ink-500);
}

.search-dropdown-list {
  max-height: 340px;
  overflow-y: auto;
}

.search-result-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px;
  border-top: 1px solid #f1f5f9;
}

.search-result-row:hover {
  background: #fffbf5;
}

.search-result-label {
  font-weight: 600;
  display: block;
}

.search-result-preview {
  color: var(--ink-500);
  font-size: 0.84rem;
}

.search-result-tag {
  font-size: 0.7rem;
  color: var(--mint);
  background: var(--mint-soft);
  border-radius: 999px;
  padding: 4px 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.search-empty {
  padding: 16px;
  color: var(--ink-500);
  font-size: 0.9rem;
}

.slides-wrapper {
  position: relative;
}

.slides-hint {
  position: absolute;
  inset: 0;
  background: rgba(17, 24, 39, 0.4);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: opacity 0.2s ease;
}

.slides-hint-hidden {
  opacity: 0;
}

.video-loading-spinner,
.app-loading-spinner {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  border: 3px solid rgba(100, 116, 139, 0.25);
  border-top-color: var(--amber);
  animation: spin 0.85s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.video-loading-dots {
  display: flex;
  gap: 5px;
}

.video-loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--amber);
  animation: dot-pulse 1s ease infinite;
}

.video-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.video-loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.15); }
}

.sidebar-toggle {
  border: 0;
  background: #fff;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  padding: 0 9px;
  cursor: pointer;
}

.sidebar-toggle span {
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: var(--ink-700);
}

.sidebar-overlay {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(2, 6, 23, 0.45);
  z-index: 180;
}

.sidebar-overlay.active {
  display: block;
}

#app-loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: rgba(255, 255, 255, 0.94);
  transition: opacity 0.25s ease;
}

#app-loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.app-loading-label {
  color: var(--ink-500);
}

.image-zoom-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
  background: rgba(2, 6, 23, 0.9);
}

.image-zoom-overlay.active {
  display: flex;
}

.image-zoom-overlay img {
  max-width: 92vw;
  max-height: 82vh;
  border-radius: 10px;
}

.image-zoom-close {
  position: absolute;
  top: 16px;
  right: 16px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  cursor: pointer;
}

.image-zoom-caption {
  color: rgba(255, 255, 255, 0.75);
}

@media (max-width: 1040px) {
  .policy-overview-grid {
    grid-template-columns: 1fr;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 760px) {
  .sidebar-toggle {
    display: inline-flex;
  }

  .build-chip {
    display: none;
  }

  .top-search {
    width: min(58vw, 400px);
  }

  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 190;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .main-content {
    margin-left: 0;
    width: 100%;
    padding: 18px;
  }
}

@media (max-width: 560px) {
  .topbar {
    padding: 0 12px;
    gap: 10px;
  }

  .brand span {
    display: none;
  }

  .top-search {
    width: min(70vw, 360px);
  }
}
</style>
