<script>
var APP_STATE = {
  domReady: false,
  metaReady: false,
  navReady: false,
  policyMeta: {},
  navItems: [],
  navLabels: {},
  searchIndex: [],
  recentlyViewed: [],
  videoCache: {},
  currentDualMedia: null
};

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function escapeJsString(str) {
  return String(str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, ' ')
    .replace(/\r/g, ' ');
}

function runServer(method, arg, success, failure) {
  var req = google.script.run
    .withSuccessHandler(success)
    .withFailureHandler(function(err) {
      console.error(method + ' failed:', err && err.message ? err.message : err);
      if (failure) failure(err || { message: 'Unknown error' });
    });

  if (typeof arg === 'undefined') {
    req[method]();
  } else {
    req[method](arg);
  }
}

function tryInit() {
  if (!APP_STATE.domReady || !APP_STATE.metaReady || !APP_STATE.navReady) return;

  buildSearchIndex();
  updateStats();
  dismissLoadingOverlay();
}

function dismissLoadingOverlay() {
  var overlay = document.getElementById('app-loading-overlay');
  if (!overlay) return;

  overlay.classList.add('hidden');
  setTimeout(function() {
    overlay.style.display = 'none';
  }, 250);
}

function preloadDriveVideos() {
  Object.keys(APP_STATE.policyMeta).forEach(function(docKey) {
    var details = APP_STATE.policyMeta[docKey].bulletDetails || {};

    Object.keys(details).forEach(function(bulletText) {
      var media = details[bulletText].media;
      if (!media) return;

      var driveMedia = null;
      if (media.type === 'gdrive-video') driveMedia = media;
      if (media.video && media.video.type === 'gdrive-video') driveMedia = media.video;
      if (!driveMedia || !driveMedia.id || APP_STATE.videoCache[driveMedia.id]) return;

      runServer('getVideoBase64', driveMedia.id, function(dataUrl) {
        APP_STATE.videoCache[driveMedia.id] = dataUrl;
      });
    });
  });
}

function buildSearchIndex() {
  APP_STATE.searchIndex = [];

  Object.keys(APP_STATE.policyMeta).forEach(function(docKey) {
    var meta = APP_STATE.policyMeta[docKey] || {};
    var label = APP_STATE.navLabels[docKey] || docKey;

    APP_STATE.searchIndex.push({
      type: 'policy',
      docKey: docKey,
      label: label,
      title: label,
      preview: meta.tagline || '',
      search: [label, meta.tagline].join(' ').toLowerCase()
    });

    var details = meta.bulletDetails || {};
    Object.keys(details).forEach(function(bulletText) {
      var detail = details[bulletText] || {};

      APP_STATE.searchIndex.push({
        type: 'bullet',
        docKey: docKey,
        label: label,
        title: detail.title || bulletText,
        bulletTitle: detail.title || bulletText,
        preview: detail.body ? String(detail.body).slice(0, 120) : '',
        search: [label, bulletText, detail.title, detail.body].join(' ').toLowerCase()
      });
    });
  });
}

function updateStats() {
  var docs = Object.keys(APP_STATE.policyMeta);
  var sections = {};
  var bullets = 0;

  APP_STATE.navItems.forEach(function(item) {
    sections[item.section || 'general'] = true;
  });

  docs.forEach(function(key) {
    var meta = APP_STATE.policyMeta[key] || {};
    bullets += (meta.bullets || []).length;
  });

  var docEl = document.getElementById('stat-doc-count');
  var secEl = document.getElementById('stat-section-count');
  var bulEl = document.getElementById('stat-bullet-count');

  if (docEl) docEl.textContent = docs.length;
  if (secEl) secEl.textContent = Object.keys(sections).length;
  if (bulEl) bulEl.textContent = bullets;
}

function buildSidebar(navItems) {
  var container = document.getElementById('nav-groups-container');
  if (!container) return;

  var sectionMap = {};
  var sectionOrder = [];

  navItems.forEach(function(item) {
    var sectionKey = item.section || 'general';
    var sectionLabel = item.sectionLabel || 'General';

    if (!sectionMap[sectionKey]) {
      sectionMap[sectionKey] = { label: sectionLabel, items: [] };
      sectionOrder.push(sectionKey);
    }

    sectionMap[sectionKey].items.push(item);
  });

  var html = sectionOrder.map(function(sectionKey) {
    var section = sectionMap[sectionKey];

    var itemHtml = section.items.map(function(item) {
      return [
        '<a href="#" class="nav-item" ',
        'data-doc-key="', escapeHtml(item.docKey), '" ',
        'data-doc-label="', escapeHtml(item.label), '">',
        escapeHtml(item.label),
        '</a>'
      ].join('');
    }).join('');

    return [
      '<section class="nav-group">',
      '  <button class="nav-group-header" type="button">',
      '    <span>', escapeHtml(section.label), '</span>',
      '    <span>+</span>',
      '  </button>',
      '  <div class="nav-items">', itemHtml, '</div>',
      '</section>'
    ].join('');
  }).join('');

  container.innerHTML = html;
}

function showView(name) {
  document.querySelectorAll('.view').forEach(function(node) {
    node.style.display = 'none';
  });

  var view = document.getElementById('view-' + name);
  if (view) view.style.display = 'block';

  if (name === 'home') {
    document.querySelectorAll('.nav-item.active').forEach(function(item) {
      item.classList.remove('active');
    });
  }

  var main = document.querySelector('.main-content');
  if (main) main.scrollTop = 0;
  window.scrollTo(0, 0);
}

function markActiveNav(docKey) {
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.classList.toggle('active', item.getAttribute('data-doc-key') === docKey);
  });
}

function addToRecentlyViewed(docKey, label) {
  APP_STATE.recentlyViewed = APP_STATE.recentlyViewed.filter(function(item) {
    return item.key !== docKey;
  });

  APP_STATE.recentlyViewed.unshift({ key: docKey, label: label, time: new Date() });
  APP_STATE.recentlyViewed = APP_STATE.recentlyViewed.slice(0, 5);
  renderRecentlyViewed();
}

function getTimeAgo(date) {
  var diff = Math.floor((new Date() - date) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
  if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
  return Math.floor(diff / 86400) + ' day ago';
}

function renderRecentlyViewed() {
  var list = document.getElementById('recently-viewed-list');
  if (!list) return;

  if (!APP_STATE.recentlyViewed.length) {
    list.innerHTML = '<p class="doc-empty">No documents viewed yet.</p>';
    return;
  }

  list.innerHTML = APP_STATE.recentlyViewed.map(function(entry) {
    return [
      '<a href="#" class="doc-row" data-recent-key="', escapeHtml(entry.key), '" data-recent-label="', escapeHtml(entry.label), '">',
      '<span>', escapeHtml(entry.label), '</span>',
      '<span class="doc-time">', getTimeAgo(entry.time), '</span>',
      '</a>'
    ].join('');
  }).join('');
}

function renderBullets(docKey) {
  var meta = APP_STATE.policyMeta[docKey] || {};
  var bullets = meta.bullets || [];
  var details = meta.bulletDetails || {};
  var list = document.getElementById('policy-bullets');

  if (!list) return;
  list.innerHTML = '';

  bullets.forEach(function(text) {
    var li = document.createElement('li');
    li.textContent = text;

    if (details[text]) {
      li.classList.add('bullet-clickable');
      li.setAttribute('data-bullet-doc', docKey);
      li.setAttribute('data-bullet-text', text);
    }

    list.appendChild(li);
  });
}

function buildMediaSrc(media) {
  if (!media || !media.id) return null;

  switch (media.type) {
    case 'image':
      return 'https://drive.google.com/thumbnail?id=' + media.id + '&sz=w1200';
    case 'audio':
      return 'https://drive.google.com/file/d/' + media.id + '/preview';
    case 'gslides':
      return 'https://docs.google.com/presentation/d/' + media.id + '/embed?rm=minimal&start=false&loop=false';
    case 'youtube':
      return 'https://www.youtube.com/embed/' + sanitizeYoutubeId(media.id) + '?rel=0&modestbranding=1';
    case 'vimeo':
      return 'https://player.vimeo.com/video/' + media.id;
    case 'gdrive-video':
      return 'https://drive.google.com/file/d/' + media.id + '/preview';
    default:
      return null;
  }
}

function sanitizeYoutubeId(value) {
  var id = String(value || '');

  if (id.indexOf('youtube.com/watch') !== -1) {
    var match = id.match(/[?&]v=([^&]+)/);
    if (match) return match[1];
  }

  if (id.indexOf('youtu.be/') !== -1) {
    return id.split('youtu.be/')[1].split('?')[0];
  }

  return id;
}

function showMediaPlaceholder(box) {
  box.innerHTML =
    '<div class="media-placeholder"><span>No media configured</span></div>';
}

function renderMediaBox(containerId, media) {
  var box = document.getElementById(containerId);
  if (!box) return;

  var src = buildMediaSrc(media);
  if (!src) {
    showMediaPlaceholder(box);
    return;
  }

  var caption = media.caption
    ? '<span class="modal-media-caption">' + escapeHtml(media.caption) + '</span>'
    : '';

  if (media.type === 'gdrive-video') {
    if (APP_STATE.videoCache[media.id]) {
      box.innerHTML =
        '<video controls preload="auto"><source src="' + APP_STATE.videoCache[media.id] + '" type="video/mp4"></video>' + caption;
      return;
    }

    box.innerHTML =
      '<div class="video-loading-box">' +
      '  <div class="video-loading-spinner"></div>' +
      '  <span>Preparing video</span>' +
      '  <div class="video-loading-dots"><span></span><span></span><span></span></div>' +
      '</div>';

    runServer('getVideoBase64', media.id, function(dataUrl) {
      APP_STATE.videoCache[media.id] = dataUrl;
      box.innerHTML =
        '<video controls preload="auto"><source src="' + dataUrl + '" type="video/mp4"></video>' + caption;
    }, function() {
      box.innerHTML =
        '<div class="video-loading-box"><span class="doc-error">Failed to load video.</span></div>';
    });

    return;
  }

  if (media.type === 'image') {
    box.innerHTML =
      '<img src="' + src + '" alt="" class="media-img-zoomable" ' +
      'onclick="openImageZoom(\'' + escapeJsString(src) + '\',\'' + escapeJsString(media.caption || '') + '\')" />' +
      caption;
    return;
  }

  if (media.type === 'gslides') {
    var hintId = 'slides-hint-' + containerId;
    var wrapId = 'slides-wrap-' + containerId;

    box.innerHTML =
      '<div class="slides-wrapper" id="' + wrapId + '">' +
      '  <iframe src="' + src + '" allowfullscreen></iframe>' +
      '  <div class="slides-hint" id="' + hintId + '">Click to interact</div>' +
      '</div>' + caption;

    (function() {
      var hint = document.getElementById(hintId);
      var wrap = document.getElementById(wrapId);
      if (!hint || !wrap) return;

      function fadeHint() {
        hint.classList.add('slides-hint-hidden');
        wrap.removeEventListener('click', fadeHint);
      }

      wrap.addEventListener('click', fadeHint);
      setTimeout(fadeHint, 2400);
    })();

    return;
  }

  box.innerHTML =
    '<iframe src="' + src + '" allowfullscreen loading="lazy"></iframe>' + caption;
}

function switchModalMedia(type) {
  if (!APP_STATE.currentDualMedia) return;

  var targetMedia = APP_STATE.currentDualMedia[type];
  if (!targetMedia) return;

  document.getElementById('switcher-btn-slides').classList.toggle('active', type === 'slides');
  document.getElementById('switcher-btn-video').classList.toggle('active', type === 'video');
  renderMediaBox('modal-media-container', targetMedia);
}

function openModal(title, body, media) {
  var overlay = document.getElementById('bullet-modal-overlay');
  var container = document.getElementById('modal-media-container');
  var placeholder = document.getElementById('modal-media-placeholder');
  var switcher = document.getElementById('modal-media-switcher');

  document.getElementById('modal-title').textContent = title || '';
  document.getElementById('modal-body').textContent = body || '';

  container.innerHTML = '';
  container.style.display = 'none';
  placeholder.style.display = 'none';
  switcher.style.display = 'none';
  APP_STATE.currentDualMedia = null;

  if (media && media.slides && media.video) {
    APP_STATE.currentDualMedia = media;
    switcher.style.display = 'flex';
    switchModalMedia(media.default || 'slides');
    container.style.display = 'block';
  } else if (media && media.id) {
    renderMediaBox('modal-media-container', media);
    container.style.display = 'block';
  } else {
    placeholder.style.display = 'flex';
  }

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  var overlay = document.getElementById('bullet-modal-overlay');
  var container = document.getElementById('modal-media-container');
  var placeholder = document.getElementById('modal-media-placeholder');
  var switcher = document.getElementById('modal-media-switcher');

  overlay.classList.remove('active');
  container.innerHTML = '';
  container.style.display = 'none';
  placeholder.style.display = 'none';
  switcher.style.display = 'none';
  APP_STATE.currentDualMedia = null;
  document.body.style.overflow = '';
}

function loadPolicy(event, docKey, label) {
  if (event && typeof event.preventDefault === 'function') event.preventDefault();

  markActiveNav(docKey);
  showView('policy');

  var meta = APP_STATE.policyMeta[docKey] || {};
  document.getElementById('policy-title').textContent = label;
  document.getElementById('policy-tagline').textContent = meta.tagline || '';

  renderBullets(docKey);
  renderMediaBox('policy-media-content', meta.media || null);

  var full = document.getElementById('policy-full-content');
  full.innerHTML = '<span class="doc-loading">Loading document...</span>';

  runServer('getDocContent', docKey, function(result) {
    if (!result || result.type === 'error') {
      full.innerHTML = '<span class="doc-error">' + escapeHtml((result && result.message) || 'Document unavailable') + '</span>';
      return;
    }

    full.innerHTML =
      '<div class="doc-embed-wrapper">' +
      '  <iframe src="' + result.url + '" class="doc-embed-frame" allowfullscreen loading="lazy"></iframe>' +
      '</div>';
  }, function(err) {
    full.innerHTML = '<span class="doc-error">Failed to load: ' + escapeHtml(err.message) + '</span>';
  });

  addToRecentlyViewed(docKey, label);
  closeSidebar();
}

function closeSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');

  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('active');
  document.body.style.overflow = '';
}

function openSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');

  if (sidebar) sidebar.classList.add('open');
  if (overlay) overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeSearchDropdown() {
  var dropdown = document.getElementById('search-dropdown');
  if (dropdown) dropdown.style.display = 'none';
}

function renderSearchResults(query, results) {
  var dropdown = document.getElementById('search-dropdown');
  var count = document.getElementById('search-results-count');
  var list = document.getElementById('search-results-list');

  if (!dropdown || !count || !list) return;

  if (!query) {
    dropdown.style.display = 'none';
    list.innerHTML = '';
    return;
  }

  dropdown.style.display = 'block';
  count.textContent = results.length
    ? results.length + ' result' + (results.length > 1 ? 's' : '') + ' for "' + query + '"'
    : 'No results for "' + query + '"';

  if (!results.length) {
    list.innerHTML = '<div class="search-empty">No matches found.</div>';
    return;
  }

  list.innerHTML = results.map(function(item) {
    return [
      '<a href="#" class="search-result-row" ',
      'data-search-type="', item.type, '" ',
      'data-search-doc="', escapeHtml(item.docKey), '" ',
      'data-search-label="', escapeHtml(item.label), '" ',
      'data-search-bullet="', escapeHtml(item.bulletTitle || ''), '">',
      '<span>',
      '  <span class="search-result-label">', escapeHtml(item.type === 'policy' ? item.label : item.label + ' -> ' + item.title), '</span>',
      '  <span class="search-result-preview">', escapeHtml(item.preview || ''), '</span>',
      '</span>',
      '<span class="search-result-tag">', item.type === 'policy' ? 'Policy' : 'Detail', '</span>',
      '</a>'
    ].join('');
  }).join('');
}

function runSearch(query) {
  var q = String(query || '').trim().toLowerCase();
  if (!q) {
    closeSearchDropdown();
    return;
  }

  var results = APP_STATE.searchIndex.filter(function(item) {
    return item.search.indexOf(q) !== -1;
  });

  renderSearchResults(q, results);
}

function loadPolicyAndOpenBullet(docKey, label, bulletTitle) {
  loadPolicy(null, docKey, label);

  var details = ((APP_STATE.policyMeta[docKey] || {}).bulletDetails || {});
  Object.keys(details).forEach(function(bulletText) {
    var detail = details[bulletText];
    if (detail && detail.title === bulletTitle) {
      setTimeout(function() {
        openModal(detail.title, detail.body, detail.media || null);
      }, 140);
    }
  });
}

function openImageZoom(src, caption) {
  var overlay = document.getElementById('image-zoom-overlay');
  var image = document.getElementById('image-zoom-img');
  var text = document.getElementById('image-zoom-caption');

  image.src = src;
  image.alt = caption || '';
  text.textContent = caption || '';
  text.style.display = caption ? 'block' : 'none';

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeImageZoom() {
  var overlay = document.getElementById('image-zoom-overlay');
  var image = document.getElementById('image-zoom-img');

  overlay.classList.remove('active');
  image.src = '';
  if (!document.getElementById('bullet-modal-overlay').classList.contains('active')) {
    document.body.style.overflow = '';
  }
}

document.addEventListener('click', function(event) {
  var groupHeader = event.target.closest('.nav-group-header');
  if (groupHeader) {
    groupHeader.classList.toggle('expanded');
    return;
  }

  var navLink = event.target.closest('.nav-item[data-doc-key]');
  if (navLink) {
    event.preventDefault();
    loadPolicy(event, navLink.getAttribute('data-doc-key'), navLink.getAttribute('data-doc-label'));
    return;
  }

  var recentLink = event.target.closest('.doc-row[data-recent-key]');
  if (recentLink) {
    event.preventDefault();
    loadPolicy(event, recentLink.getAttribute('data-recent-key'), recentLink.getAttribute('data-recent-label'));
    return;
  }

  var bullet = event.target.closest('#policy-bullets li[data-bullet-doc]');
  if (bullet) {
    var docKey = bullet.getAttribute('data-bullet-doc');
    var text = bullet.getAttribute('data-bullet-text');
    var details = ((APP_STATE.policyMeta[docKey] || {}).bulletDetails || {});
    var detail = details[text];

    if (detail) {
      openModal(detail.title, detail.body, detail.media || null);
    }
    return;
  }

  var search = event.target.closest('.search-result-row');
  if (search) {
    event.preventDefault();
    var doc = search.getAttribute('data-search-doc');
    var label = search.getAttribute('data-search-label');
    var type = search.getAttribute('data-search-type');
    var bulletTitle = search.getAttribute('data-search-bullet');

    closeSearchDropdown();
    document.getElementById('searchInput').value = '';

    if (type === 'policy') {
      loadPolicy(event, doc, label);
    } else {
      loadPolicyAndOpenBullet(doc, label, bulletTitle);
    }
    return;
  }

  var modalSwitcher = event.target.closest('[data-modal-media]');
  if (modalSwitcher) {
    event.preventDefault();
    switchModalMedia(modalSwitcher.getAttribute('data-modal-media'));
    return;
  }

  if (event.target.id === 'bullet-modal-overlay') {
    closeModal();
  }
});

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    closeSearchDropdown();

    var imgOverlay = document.getElementById('image-zoom-overlay');
    if (imgOverlay && imgOverlay.classList.contains('active')) {
      closeImageZoom();
      return;
    }

    var modal = document.getElementById('bullet-modal-overlay');
    if (modal && modal.classList.contains('active')) {
      closeModal();
    }
  }
});

document.addEventListener('DOMContentLoaded', function() {
  APP_STATE.domReady = true;

  var input = document.getElementById('searchInput');
  if (input) {
    input.addEventListener('input', function() {
      runSearch(this.value);
    });
  }

  var backBtn = document.getElementById('backToHomeBtn');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      showView('home');
    });
  }

  var homeBtn = document.getElementById('brandHomeBtn');
  if (homeBtn) {
    homeBtn.addEventListener('click', function() {
      showView('home');
      closeSidebar();
    });
  }

  var sidebarToggle = document.getElementById('sidebarToggle');
  if (sidebarToggle) {
    sidebarToggle.addEventListener('click', function() {
      var sidebar = document.querySelector('.sidebar');
      if (sidebar && sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });
  }

  var sidebarOverlay = document.getElementById('sidebarOverlay');
  if (sidebarOverlay) {
    sidebarOverlay.addEventListener('click', closeSidebar);
  }

  window.addEventListener('resize', function() {
    if (window.innerWidth > 760) closeSidebar();
  });

  tryInit();
});

runServer('getPolicyMeta', undefined, function(meta) {
  APP_STATE.policyMeta = meta || {};
  APP_STATE.metaReady = true;
  preloadDriveVideos();
  tryInit();
});

runServer('getNavLabels', undefined, function(navItems) {
  APP_STATE.navItems = navItems || [];
  APP_STATE.navLabels = {};

  APP_STATE.navItems.forEach(function(item) {
    APP_STATE.navLabels[item.docKey] = item.label;
  });

  buildSidebar(APP_STATE.navItems);
  APP_STATE.navReady = true;
  tryInit();
});
</script>
