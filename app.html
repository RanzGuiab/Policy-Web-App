<script>
// ===========================
// POLICY META
// Loaded from Google Sheet via Code.gs
// DO NOT hardcode here — edit via Sheet:
// https://docs.google.com/spreadsheets/d/1VZy3i_uRU__VQkR11xdQtP9KUSi3jF8ow-dg6eHqQuU
// ===========================

// ===========================
// SAFE INIT GATE
// Waits for BOTH:
//   1. DOM ready
//   2. POLICY_META loaded from Sheet
// Whichever finishes last triggers initApp()
// ===========================
var _domReady  = false;
var _metaReady = false;

function _tryInit() {
  if (_domReady && _metaReady) {
    initApp();
  }
}

var POLICY_META = {};

google.script.run
  .withSuccessHandler(function(meta) {
    POLICY_META = meta;
    _metaReady  = true;
    _tryInit();
  })
  .withFailureHandler(function(err) {
    console.error('getPolicyMeta FAILED:', err.message);
  })
  .getPolicyMeta();

// ── ONE instance only ──────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  _domReady = true;
  _tryInit();
});

// ===========================
// INIT APP
// Called only after POLICY_META
// is loaded from Google Sheet
// ===========================
function initApp() {

  // ── 1. Build search index ──────────────────────────────
  SEARCH_INDEX = [];
  Object.keys(POLICY_META).forEach(function(docKey) {
    var meta  = POLICY_META[docKey];
    var label = NAV_LABELS[docKey] || docKey;

    SEARCH_INDEX.push({
      type:    'policy',
      docKey:  docKey,
      label:   label,
      preview: meta.tagline || '',
      search:  [label, meta.tagline].join(' ').toLowerCase()
    });

    var details = meta.bulletDetails || {};
    Object.keys(details).forEach(function(bulletText) {
      var detail = details[bulletText];
      SEARCH_INDEX.push({
        type:    'bullet',
        docKey:  docKey,
        label:   label,
        title:   detail.title,
        preview: detail.body ? detail.body.substring(0, 100) + '...' : '',
        media:   detail.media || null,
        search:  [bulletText, detail.title, detail.body].join(' ').toLowerCase()
      });
    });
  });

  // ── 2. Preload videos silently ─────────────────────────
  Object.keys(POLICY_META).forEach(function(docKey) {
    var details = POLICY_META[docKey].bulletDetails || {};
    Object.keys(details).forEach(function(bulletText) {
      var media = details[bulletText].media;
      if (!media) return;

      var videoMedia = (media.video && media.video.type === 'gdrive-video') ? media.video : null;
      if (!videoMedia && media.type === 'gdrive-video') videoMedia = media;

      if (videoMedia && videoMedia.id && !_videoCache[videoMedia.id]) {
        (function(fileId) {
          google.script.run
            .withSuccessHandler(function(dataUrl) { _videoCache[fileId] = dataUrl; })
            .withFailureHandler(function() {})
            .getVideoBase64(fileId);
        })(videoMedia.id);
      }
    });
  });

  // ── 3. Dismiss loading overlay ─────────────────────────
  var overlay = document.getElementById('app-loading-overlay');
  if (overlay) {
    overlay.classList.add('hidden');
    setTimeout(function() { overlay.style.display = 'none'; }, 300);
  }
}

// ===========================
// AUTH CHECK — CLIENT SIDE
// ===========================
// ===========================
// AUTH CHECK — CLIENT SIDE
// Phase 1: server checks Drive/Docs/Session
// Phase 2: client extracts IDs from POLICY_META
//          and sends to server for media checks
// ===========================
function runAuthCheck() {
  var btn    = document.getElementById('auth-check-btn');
  var output = document.getElementById('auth-check-output');
  if (!btn || !output) return;

  btn.disabled         = true;
  btn.textContent      = 'Checking...';
  output.style.display = 'block';
  output.innerHTML     =
    '<div class="auth-check-row">' +
      '<div class="video-loading-spinner" style="width:16px;height:16px;border-width:2px;margin-right:8px;display:inline-block;"></div>' +
      '<span>Contacting Apps Script...</span>' +
    '</div>';

  // ── Phase 1: server auth check ───────────────────────────
  google.script.run
    .withSuccessHandler(function(result) {

      // ── Phase 2: extract media IDs from POLICY_META ──────
      var ids = { slidesId: null, videoId: null, imageId: null, audioId: null };

      Object.keys(POLICY_META).forEach(function(dk) {
        // Top-level image
        var top = POLICY_META[dk].media;
        if (top && top.type === 'image' && top.id && !ids.imageId) {
          ids.imageId = top.id;
        }

        var bd = POLICY_META[dk].bulletDetails || {};
        Object.keys(bd).forEach(function(bk) {
          var m = bd[bk].media;
          if (!m) return;

          // Single media
          if (m.type === 'gslides'      && m.id && !ids.slidesId) ids.slidesId = m.id;
          if (m.type === 'gdrive-video' && m.id && !ids.videoId)  ids.videoId  = m.id;
          if (m.type === 'youtube'      && m.id && !ids.videoId)  ids.videoId  = m.id;
          if (m.type === 'audio'        && m.id && !ids.audioId)  ids.audioId  = m.id;

        // Dual media
        if (m.slides && m.slides.id && !ids.slidesId) ids.slidesId = m.slides.id;
        if (m.video  && m.video.type === 'gdrive-video' && m.video.id && !ids.videoId) {
          ids.videoId = m.video.id;
        }
        if (m.video  && m.video.type === 'youtube' && m.video.id && !ids.videoId) {
          ids.videoId = m.video.id;
        }
        });
      });

      // Also check POLICY_META ↔ DOCS key parity client-side
      var metaKeys    = Object.keys(POLICY_META);
      var docsKeys    = Object.keys(NAV_LABELS);
      var missingMeta = docsKeys.filter(function(k) { return metaKeys.indexOf(k) === -1; });
      var missingNav  = metaKeys.filter(function(k) { return docsKeys.indexOf(k) === -1; });
      var parityOk    = missingMeta.length === 0 && missingNav.length === 0;

      result.services.keyParity = {
        ok:      parityOk,
        message: parityOk
          ? 'POLICY_META and NAV_LABELS match (' + metaKeys.length + ' keys)'
          : (missingMeta.length ? 'In NAV_LABELS not META: ' + missingMeta.join(', ') + '. ' : '') +
            (missingNav.length  ? 'In META not NAV_LABELS: ' + missingNav.join(', ')          : '')
      };
      if (!parityOk) result.overall = false;

      // ── Phase 2 server call — media ID checks ────────────
      google.script.run
        .withSuccessHandler(function(mediaResult) {
          btn.disabled    = false;
          btn.textContent = 'Check Auth';

          // Merge media results into main result
          Object.keys(mediaResult).forEach(function(k) {
            result.services[k] = mediaResult[k];
            if (!mediaResult[k].ok) result.overall = false;
          });

          renderAuthResult(output, result);
        })
        .withFailureHandler(function(err) {
          btn.disabled    = false;
          btn.textContent = 'Check Auth';
          result.services.mediaCheck = { ok: false, message: err.message };
          result.overall = false;
          renderAuthResult(output, result);
        })
        .checkMediaIds(ids);
    })
    .withFailureHandler(function(err) {
      btn.disabled    = false;
      btn.textContent = 'Check Auth';
      output.innerHTML =
        '<div class="auth-check-row">' +
          '<span>❌ <strong>Script error</strong></span>' +
          '<span style="color:#ef4444;font-size:12px;">' + err.message + '</span>' +
        '</div>';
    })
    .checkAuthStatus();
}

// Populated by initApp() after POLICY_META loads
var SEARCH_INDEX = [];

// ===========================
// RENDER AUTH RESULT
// ===========================
function renderAuthResult(output, result) {
  var rows = Object.keys(result.services).map(function(key) {
    var svc   = result.services[key];
    var icon  = svc.ok ? '✅' : '❌';
    var color = svc.ok ? 'var(--accent-bright)' : '#ef4444';
    return '<div class="auth-check-row">' +
             '<span>' + icon + ' <strong>' + key + '</strong></span>' +
             '<span style="color:' + color + ';font-size:12px;">' + svc.message + '</span>' +
           '</div>';
  }).join('');

  var overallColor = result.overall ? 'var(--accent-bright)' : '#ef4444';
  var overallText  = result.overall ? '✅ All systems authenticated' : '❌ Issues detected — see below';

  output.innerHTML =
    '<div class="auth-check-overall" style="color:' + overallColor + ';">' + overallText + '</div>' +
    rows +
    '<div class="auth-check-time">Checked at: ' + result.timestamp + '</div>';
}

// ===========================
// VIDEO CACHE
// Stores base64 data URLs after first load
// so subsequent renders are instant
// ===========================
var _videoCache = {};

// ===========================
// MEDIA SWITCHER
// ===========================
var _currentDualMedia = null;

function switchModalMedia(type) {
  if (!_currentDualMedia) return;

  var media = _currentDualMedia[type];
  if (!media) return;

  document.getElementById('switcher-btn-slides').classList.toggle('active', type === 'slides');
  document.getElementById('switcher-btn-video').classList.toggle('active',  type === 'video');

  // ✅ Clear container first — prevents old content showing during load
  var container = document.getElementById('modal-media-container');
  container.innerHTML = '';

  renderMediaBox('modal-media-container', media);

  // ✅ Always show container — renderMediaBox handles content async
  container.style.display = 'block';

  if (type === 'video') {
    container.setAttribute('data-block-keys', 'true');
  } else {
    container.removeAttribute('data-block-keys');
  }
}

// ✅ Capture-phase listener — fires BEFORE iframe receives arrow keys
document.addEventListener('keydown', function(e) {
  var container = document.getElementById('modal-media-container');
  if (container && container.getAttribute('data-block-keys') === 'true') {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].indexOf(e.key) !== -1) {
      e.stopImmediatePropagation();
      e.preventDefault();
    }
  }
}, true);

function renderMediaBox(containerId, media) {
  var box = document.getElementById(containerId);
  if (!box) return;

  var src = buildMediaSrc(media);

  if (!src) {
    showMediaPlaceholder(box);
    return;
  }

  var caption = media.caption
    ? '<span class="modal-media-caption">' + media.caption + '</span>'
    : '';

  switch (media.type) {

    case 'image':
      box.innerHTML =
        '<img ' +
          'src="' + src + '" ' +
          'alt="' + (media.caption || '') + '" ' +
          'class="media-img-zoomable" ' +
          'onclick="openImageZoom(\'' + src + '\',\'' + (media.caption || '') + '\')" ' +
          'title="Click to zoom" ' +
        '/>' + caption;
      break;

    case 'audio':
      box.innerHTML =
        '<iframe src="' + src + '" class="media-audio-frame" allow="autoplay"></iframe>' + caption;
      break;

    case 'gslides':
      var hintId    = 'slides-hint-' + containerId;
      var wrapperId = 'slides-wrapper-' + containerId;
      box.innerHTML =
        '<div class="slides-wrapper" id="' + wrapperId + '">' +
          '<iframe src="' + src + '" allowfullscreen></iframe>' +
          '<div class="slides-hint" id="' + hintId + '">' +
            '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
              '<polyline points="9 18 15 12 9 6"/>' +
            '</svg>' +
            '<span>Click to turn page</span>' +
          '</div>' +
        '</div>' + caption;

  (function() {
    var hint    = document.getElementById(hintId);
    var wrapper = document.getElementById(wrapperId);
    if (!hint || !wrapper) return;

    function fadeHint() {
      hint.classList.add('slides-hint-hidden');
      // ✅ Remove wrapper click after fade so iframe works normally
      wrapper.removeEventListener('click', fadeHint);
    }

    // ✅ Listen on wrapper — catches clicks that pass through hint
    wrapper.addEventListener('click', fadeHint);

    // ✅ Auto fade after 1 second if not clicked
    setTimeout(fadeHint, 2500);
  })();
  break;
case 'gdrive-video':
  // ===========================
  // GCP MIGRATION NOTE
  // When migrating to Cloud Storage:
  //   1. getVideoBase64 returns a GCS URL instead of base64
  //   2. Replace the <source src="..."> below with the URL directly
  //   3. Remove the _videoCache check — browser caches GCS natively
  //   4. Remove the preloader in DOMContentLoaded — no longer needed
  //   See Code.gs getVideoBase64 for full migration steps.
  // ===========================
  // ✅ Already cached — render instantly
  if (_videoCache[media.id]) {
    box.innerHTML =
      '<video controls style="width:100%;border-radius:8px;background:#000;" preload="auto">' +
        '<source src="' + _videoCache[media.id] + '" type="video/mp4">' +
      '</video>' + caption;
    break;
  }

  // ✅ Not yet cached — show loading state, fetch in background
  box.innerHTML =
    '<div class="video-loading-box">' +
      '<div class="video-loading-spinner"></div>' +
      '<span class="video-loading-label">Preparing video</span>' +
      '<div class="video-loading-dots">' +
        '<span></span><span></span><span></span>' +
      '</div>' +
    '</div>';

  (function(targetBox, fileId, cap) {
    google.script.run
      .withSuccessHandler(function(dataUrl) {
        _videoCache[fileId] = dataUrl;
        if (!targetBox) return;
        targetBox.innerHTML =
          '<video controls style="width:100%;border-radius:8px;background:#000;" preload="auto">' +
            '<source src="' + dataUrl + '" type="video/mp4">' +
          '</video>' + cap;
      })
      .withFailureHandler(function() {
        if (!targetBox) return;
        targetBox.innerHTML =
          '<div class="video-loading-box">' +
            '<span class="video-loading-label" style="color:#ef4444;">Failed to load video.</span>' +
          '</div>';
      })
      .getVideoBase64(fileId);
  })(box, media.id, caption);
  break;
    case 'gslides-auto':
      box.innerHTML =
        '<iframe src="' + src + '" allowfullscreen></iframe>' + caption;
      break;

    case 'youtube':
      box.innerHTML =
        '<iframe src="' + src + '" allowfullscreen></iframe>' + caption;
      break;
  }
}

// ===========================
// BULLET CLICK → MODAL
// ===========================
function renderBullets(docKey) {
  var meta       = POLICY_META[docKey] || {};
  var bullets    = meta.bullets || [];
  var details    = meta.bulletDetails || {};
  var bulletList = document.getElementById('policy-bullets');
  bulletList.innerHTML = '';

  bullets.forEach(function(bullet) {
    var li        = document.createElement('li');
    var hasDetail = !!details[bullet];

    li.textContent = bullet;

    if (hasDetail) {
      li.classList.add('bullet-clickable');
      li.setAttribute('title', 'Click to learn more');

      li.onclick = (function(detail) {
        return function() {
          openModal(detail.title, detail.body, detail.media || null, docKey);  // ✅ pass docKey
        };
      })(details[bullet]);
    }

    bulletList.appendChild(li);
  });
}

// ===========================
// BUILD MEDIA SRC FROM ID
// ===========================
function buildMediaSrc(media) {
  if (!media || !media.id) return null;

  switch (media.type) {
    case 'image':
      return 'https://drive.google.com/thumbnail?id=' + media.id + '&sz=w1000';
    case 'audio':
      return 'https://drive.google.com/file/d/' + media.id + '/preview';
    case 'youtube':
      var ytId = media.id;
      // Strip full URL if accidentally pasted
      if (ytId.indexOf('youtube.com/watch') !== -1) {
        var match = ytId.match(/[?&]v=([^&]+)/);
        if (match) ytId = match[1];
      } else if (ytId.indexOf('youtu.be/') !== -1) {
        ytId = ytId.split('youtu.be/')[1].split('?')[0];
      }
      return 'https://www.youtube.com/embed/' + ytId +
       '?autoplay=1&mute=1&rel=0&modestbranding=1&controls=1&playsinline=1&iv_load_policy=3';
    case 'vimeo':
      return 'https://player.vimeo.com/video/' + media.id;
    case 'gslides':
      // ✅ all slides — user navigates freely
      return 'https://docs.google.com/presentation/d/' + media.id +
             '/embed?rm=minimal&start=false&loop=false';
    case 'gdrive-video':
      return 'https://drive.google.com/uc?export=view&id=' + media.id;
    default:
      return null;
  }
}

// ===========================
// OPEN MODAL
// ===========================
function openModal(title, body, media, docKey) {
  document.getElementById('modal-title').textContent = title;

  var modalBody         = document.getElementById('modal-body');
  modalBody.textContent = body || '';
  modalBody.style.opacity = '1';

  var container   = document.getElementById('modal-media-container');
  var placeholder = document.getElementById('modal-media-placeholder');
  var switcher    = document.getElementById('modal-media-switcher');

  // Reset
  container.innerHTML       = '';
  container.style.display   = 'none';
  placeholder.style.display = 'none';
  switcher.style.display    = 'none';
  _currentDualMedia         = null;

  // ── Dual media ──────────────────────────────────────────
  if (media && media.slides && media.video) {
    _currentDualMedia = media;
    var defaultType = media.default || 'slides';
    switcher.style.display = 'flex';
    document.getElementById('switcher-btn-slides').classList.toggle('active', defaultType === 'slides');
    document.getElementById('switcher-btn-video').classList.toggle('active',  defaultType === 'video');
    renderMediaBox('modal-media-container', media[defaultType]);
    container.style.display = 'block';

  // ── Single media ────────────────────────────────────────
  } else if (media && media.id) {
    renderMediaBox('modal-media-container', media);
    container.style.display   = 'block';
    placeholder.style.display = 'none';

  // ── No media ────────────────────────────────────────────
  } else {
    placeholder.style.display = 'flex';
  }

  document.getElementById('bullet-modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ===========================
// CLOSE MODAL
// ===========================
function closeModal() {
  document.getElementById('bullet-modal-overlay').classList.remove('active');
  document.body.style.overflow = '';

  var container = document.getElementById('modal-media-container');
  container.innerHTML     = '';
  container.style.display = 'none';

  document.getElementById('modal-media-placeholder').style.display = 'none';
  document.getElementById('modal-media-switcher').style.display    = 'none';

  _currentDualMedia = null;
  clearSlidesProgress();
}

// ===========================
// RECENTLY VIEWED
// Stored in memory (resets on page reload)
// ===========================
var recentlyViewed = [];

function addToRecentlyViewed(docKey, label) {
  // Remove if already exists
  recentlyViewed = recentlyViewed.filter(function(r) { return r.key !== docKey; });

  // Add to front
  recentlyViewed.unshift({ key: docKey, label: label, time: new Date() });

  // Keep only last 5
  if (recentlyViewed.length > 5) recentlyViewed = recentlyViewed.slice(0, 5);

  renderRecentlyViewed();
}

function renderRecentlyViewed() {
  var list = document.getElementById('recently-viewed-list');
  if (!list) return;

  if (recentlyViewed.length === 0) {
    list.innerHTML = '<p class="doc-empty">No recently viewed documents yet.</p>';
    return;
  }

  list.innerHTML = recentlyViewed.map(function(r) {
    var timeAgo = getTimeAgo(r.time);
    return [
      '<a href="#" class="doc-row" onclick="loadPolicyFromRecent(event,\'' + r.key + '\',\'' + r.label + '\')">',
      '  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">',
      '    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>',
      '  </svg>',
      '  <span>' + r.label + '</span>',
      '</a>'
    ].join('');
  }).join('');
}

function getTimeAgo(date) {
  var diff = Math.floor((new Date() - date) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
  if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
  return Math.floor(diff / 86400) + ' days ago';
}

function loadPolicyFromRecent(event, docKey, label) {
  event.preventDefault();
  loadPolicy(event, docKey, label);
}


// ===========================
// VIEW SWITCHING
// ===========================
function showView(viewName) {
  document.querySelectorAll('.view').forEach(function(v) {
    v.style.display = 'none';
  });

  var target = document.getElementById('view-' + viewName);
  if (target) target.style.display = 'block';

  // Clear active nav item when going home
  if (viewName === 'home') {
    document.querySelectorAll('.nav-item').forEach(function(i) {
      i.classList.remove('active');
    });
  }

  // Scroll to top
  var main = document.querySelector('.main-content');
  if (main) main.scrollTop = 0;
  window.scrollTo(0, 0);
}
// ===========================
// LOAD POLICY
// Called by sidebar nav items
// ===========================
function loadPolicy(event, docKey, label) {
  event.preventDefault();

  // Mark active nav item
  document.querySelectorAll('.nav-item').forEach(function(i) {
    i.classList.remove('active');
  });
  if (event.currentTarget && event.currentTarget.classList) {
    event.currentTarget.classList.add('active');
  }

  // Switch to policy view
  showView('policy');

  // --- CONTAINER 1: Populate from POLICY_META ---
  var meta = POLICY_META[docKey] || {};

  document.getElementById('policy-title').textContent = label;
  document.getElementById('policy-tagline').textContent = meta.tagline || '';

  // Calls the modal from bullet script replacing my old forEach Block.
  renderBullets(docKey);

  // Media
  renderMediaBox('policy-media-content', meta.media || null);

  // --- CONTAINER 2: Fetch from Google Docs via Apps Script ---
var fullContent = document.getElementById('policy-full-content');
fullContent.innerHTML = '<span class="doc-loading">Loading document...</span>';

google.script.run
  .withSuccessHandler(function(result) {
    if (result.type === 'error') {
      fullContent.innerHTML =
        '<span class="doc-error">' + result.message + '</span>';
      return;
    }

    fullContent.innerHTML =
      '<div class="doc-embed-wrapper">' +
        '<iframe ' +
          'src="' + result.url + '" ' +
          'class="doc-embed-frame" ' +
          'allowfullscreen ' +
          'loading="lazy"' +
        '></iframe>' +
      '</div>';
  })
  .withFailureHandler(function(err) {
    fullContent.innerHTML =
      '<span class="doc-error">Failed to load: ' + err.message + '</span>';
  })
  .getDocContent(docKey);

  // Track in recently viewed
  addToRecentlyViewed(docKey, label);

  // Close sidebar on mobile
  if (window.innerWidth <= 650) {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
}


// ===========================
// NAV GROUP ACCORDION
// ===========================
document.querySelectorAll('.nav-group-header').forEach(function(header) {
  header.addEventListener('click', function() {
    var navItems = header.nextElementSibling;
    header.classList.toggle('expanded');
    if (navItems) {
      navItems.style.display = header.classList.contains('expanded') ? 'block' : 'none';
    }
  });
});


// ===========================
// NAVBAR SEARCH — CMD+K
// ===========================
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    var input = document.getElementById('searchInput');
    if (input) input.focus();
  }
});


// ===========================
// MOBILE SIDEBAR TOGGLE
// ===========================
(function() {
  var toggle  = document.getElementById('sidebarToggle');
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');

  if (!toggle || !sidebar || !overlay) return;

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function() {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });

  overlay.addEventListener('click', closeSidebar);

  window.addEventListener('resize', function() {
    if (window.innerWidth > 650) closeSidebar();
  });
})();

// ===========================
// SEARCH INDEX
// Built once from POLICY_META
// + NAV_LABELS map
// ===========================

// Map docKey → human readable label
// Must match your sidebar labels exactly
var NAV_LABELS = {
  'purpose_background':     'Purpose & Background',
  'company_history':        'Company History',
  'team_structure':         'Team & Structure',
  'types_of_content':       'Types of Content',
  'office_security':        'Office Security',
  'gdpr_compliance':        'GDPR Compliance',
  'internal_communication': 'Internal Communication',
  'lead_generation':        'Lead Generation',
  'guiding_statements':     'Guiding Statements',
  'sales_calls':            'Sales Calls',
  'creating_proposals':     'Creating Proposals',
  'sales_objections':       'Sales Objections',
  'faqs':                   'FAQs'
};


// ===========================
// RUN SEARCH
// Called on input event
// ===========================
function runSearch(query) {
  var q = query.trim().toLowerCase();

  if (!q) {
    closeSearchDropdown();
    return;
  }

  var results = SEARCH_INDEX.filter(function(entry) {
    return entry.search.indexOf(q) !== -1;
  });

  renderSearchResults(q, results);
}

// ===========================
// RENDER SEARCH RESULTS
// ===========================
function renderSearchResults(query, results) {
  var dropdown  = document.getElementById('search-dropdown');
  var container = document.getElementById('search-results-list');
  var countEl   = document.getElementById('search-results-count');

  if (!query) {
    dropdown.style.display = 'none';
    return;
  }

  dropdown.style.display = 'block';

  countEl.textContent = results.length
    ? results.length + ' result' + (results.length > 1 ? 's' : '') + ' for "' + query + '"'
    : 'No results for "' + query + '"';

  if (!results.length) {
    container.innerHTML =
      '<div class="search-empty">' +
        '<span>No matches found</span>' +
      '</div>';
    return;
  }

  container.innerHTML = results.map(function(r) {
    var isPolicy = r.type === 'policy';
    var onclick  = isPolicy
      ? 'selectSearchResult(event,\'' + r.docKey + '\',\'' + r.label + '\',null)'
      : 'selectSearchResult(event,\'' + r.docKey + '\',\'' + r.label + '\',\'' + r.title + '\')';

    return [
      '<a href="#" class="search-result-row" onclick="' + onclick + '">',
      '  <div class="search-result-text">',
      '    <span class="search-result-label">' +
             (isPolicy ? r.label : r.label + ' → ' + r.title) +
           '</span>',
      '    <span class="search-result-preview">' + r.preview + '</span>',
      '  </div>',
      '  <span class="search-result-tag">' + (isPolicy ? 'Policy' : 'Detail') + '</span>',
      '</a>'
    ].join('');
  }).join('');
}

// ===========================
// SELECT A SEARCH RESULT
// Closes dropdown then navigates
// ===========================
function selectSearchResult(event, docKey, label, bulletTitle) {
  event.preventDefault();

  // Close dropdown
  closeSearchDropdown();

  // Clear input
  document.getElementById('searchInput').value = '';

  if (!bulletTitle) {
    loadPolicy(event, docKey, label);
  } else {
    loadPolicyAndOpenBullet(event, docKey, label, bulletTitle);
  }
}

function closeSearchDropdown() {
  var dropdown = document.getElementById('search-dropdown');
  if (dropdown) dropdown.style.display = 'none';
}

// ===========================
// LOAD POLICY + OPEN BULLET MODAL
// For bullet-level search results
// ===========================
function loadPolicyAndOpenBullet(event, docKey, label, bulletTitle) {
  event.preventDefault();

  // Load the policy page first
  loadPolicy(event, docKey, label);

  // Then find the matching bulletDetail and open its modal
  var meta    = POLICY_META[docKey] || {};
  var details = meta.bulletDetails || {};

  Object.keys(details).forEach(function(bulletText) {
    var detail = details[bulletText];
    if (detail.title === bulletTitle) {
      // Small delay so policy view renders first
      setTimeout(function() {
        openModal(detail.title, detail.body, detail.media || null);
      }, 150);
    }
  });
}

// ===========================
// SEARCH INPUT LISTENER
// Replaces the CMD+K only block
// ===========================
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('searchInput');
  if (!input) return;

  input.addEventListener('input', function() {
    runSearch(this.value);
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      this.value = '';
      closeSearchDropdown();
      this.blur();
    }
  });
});

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  var search = document.querySelector('.navbar-search');
  if (search && !search.contains(e.target)) {
    closeSearchDropdown();
  }
});

document.addEventListener('DOMContentLoaded', function() {
  var list = document.getElementById('search-results-list');  // ✅ the actual scroll container
  if (!list) return;

  list.addEventListener('wheel', function(e) {
    var atTop    = this.scrollTop === 0;
    var atBottom = this.scrollTop + this.clientHeight >= this.scrollHeight;

    if ((atTop && e.deltaY < 0) || (atBottom && e.deltaY > 0)) {
      e.preventDefault();
    }

    e.stopPropagation();
  }, { passive: false });
});

// ===========================
// IMAGE ZOOM MODAL
// ===========================
function openImageZoom(src, caption) {
  var overlay = document.getElementById('image-zoom-overlay');
  var img     = document.getElementById('image-zoom-img');
  var cap     = document.getElementById('image-zoom-caption');

  img.src           = src;
  img.alt           = caption || '';
  cap.textContent   = caption || '';
  cap.style.display = caption ? 'block' : 'none';

  // ✅ Reset first in case previous close is mid-transition
  overlay.classList.remove('active');
  overlay.style.display = 'flex';

  document.body.style.overflow = 'hidden';

  // Trigger fade in on next frame
  requestAnimationFrame(function() {
    overlay.classList.add('active');
  });
}

function closeImageZoom() {
  var overlay = document.getElementById('image-zoom-overlay');
  overlay.classList.remove('active');
  document.body.style.overflow = '';

  // ✅ Wait for fade out THEN hide — so overlay stops blocking clicks
  setTimeout(function() {
    overlay.style.display = 'none';
    document.getElementById('image-zoom-img').src = '';
  }, 200);
}

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var overlay = document.getElementById('image-zoom-overlay');
    if (overlay && overlay.classList.contains('active')) {
      closeImageZoom();
    }
  }
});
</script>
